name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      # Casks are macOS-only, so a single macOS runner with the syntax/style/audit
      # check is all this tap needs.
      - run: brew test-bot --only-tap-syntax
